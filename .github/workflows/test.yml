name: Test Automation
on: 
    push:
        branches: [main]

jobs:
    test-job:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: backend 
        steps:
            - name: Checkout Repo
                uses: actions/checkout@v4
            - name: Setup Node
                uses: actions/setup-node@v4
            - name: Install Dependencies
                run: npn install 
            - name: Run Tests
                run: npm test
            